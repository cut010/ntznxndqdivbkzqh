name: Process Videos

on:
  push:
    paths:
      - 'data/content.json'
    branches: [main]
  workflow_dispatch:
    inputs:
      season:
        description: 'Temporada (vacio = todas)'
        required: false
        default: ''
      category:
        description: 'Categoria (vacio = todas)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: process-videos
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq

      - name: Process pending videos
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY || vars.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY || vars.IA_SECRET_KEY }}
        run: |
          chmod +x scripts/process-videos.sh
          bash scripts/process-videos.sh

      - name: Commit changes
        run: |
          git config user.name "lidlt-bot"
          git config user.email "bot@laisla.wtf"
          git diff --quiet data/content.json && echo "Sin cambios" && exit 0
          git add data/content.json
          git commit -m "auto: mp4 procesados [skip ci]"
          git push
